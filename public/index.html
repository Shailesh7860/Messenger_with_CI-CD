<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex justify-center items-center h-screen m-0 font-sans antialiased">

    <div id="auth-screen" class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-700/50 transition-all">
        <div class="text-center mb-6">
            <span class="text-4xl">🔐</span>
            <h2 class="text-2xl font-bold mt-2 text-white">Secure Gateway</h2>
            <p class="text-slate-400 text-sm mt-1">Sign in with End-to-End Cryptography</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Username" onkeydown="if(event.key === 'Enter') document.getElementById('password').focus()" class="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none text-white transition-all placeholder:text-slate-500" autofocus>
    
            <input type="password" id="password" placeholder="Password" onkeydown="if(event.key === 'Enter') login()" class="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none text-white transition-all placeholder:text-slate-500">
    
            <button onclick="login()" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 font-semibold rounded-xl text-white shadow-lg shadow-indigo-600/30 active:scale-[0.98] transition-all cursor-pointer">Verify & Connect</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden bg-slate-800 rounded-2xl shadow-2xl w-full max-w-4xl h-[650px] border border-slate-700/50 overflow-hidden flex">
        
        <div class="w-1/3 bg-slate-950 border-r border-slate-700/50 flex flex-col">
            <div class="p-4 border-b border-slate-700/50 flex items-center justify-between">
                <span id="welcome-title" class="font-bold text-white text-sm truncate">Chat System</span>
                <button onclick="logout()" class="text-xs text-slate-400 hover:text-rose-400 bg-slate-800 hover:bg-rose-950/30 border border-slate-700/50 hover:border-rose-900/50 px-2 py-1 rounded-md transition-all cursor-pointer">Log Out</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-2 space-y-1">
                <span class="text-[10px] uppercase font-bold tracking-wider text-slate-500 px-2 block my-2">Channels</span>
                <button onclick="switchRoom('global')" id="room-btn-global" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl bg-indigo-600 text-white font-medium text-sm transition-all text-left shadow-lg shadow-indigo-600/10 cursor-pointer">
                    <span class="text-base">🌐</span>
                    <span class="truncate flex-1">Global Lounge</span>
                </button>
                
                <span class="text-[10px] uppercase font-bold tracking-wider text-slate-500 px-2 block pt-4 pb-2">Active Chatters</span>
                <div id="active-user-nodes" class="space-y-1"></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-slate-800">
            <div class="bg-slate-950/40 p-4 border-b border-slate-700/50 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
                    <h2 id="chat-header" class="font-semibold text-white tracking-wide">💬 Global Lounge</h2>
                </div>
                <span class="text-[10px] font-mono bg-indigo-950/50 border border-indigo-900/50 text-indigo-400 px-2 py-0.5 rounded">🔒 E2EE Active</span>
            </div>

            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-thin scrollbar-thumb-slate-700 scrollbar-track-transparent"></div>

            <div id="typing-indicator" class="px-4 text-xs text-indigo-400 italic h-5 flex items-center bg-slate-800/30 font-medium"></div>

            <div class="p-3 bg-slate-950 border-t border-slate-700/50 flex items-center space-x-2">
                <input type="text" id="msg-input" placeholder="Type an encrypted message..." oninput="notifyTyping()" onkeydown="checkEnter(event)" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white outline-none focus:border-indigo-500 transition-all text-sm">
                <button onclick="sendMessage()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl font-medium text-sm transition-all shadow-lg shadow-indigo-600/20 cursor-pointer active:scale-95">Send</button>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let currentUsername = "";
        let currentRoom = "global";
        let typingTimeout;

        // 🚀 REFACTORED E2EE: Deterministic room passphrases using CryptoJS
        function getRoomSecretPhrase(roomIdentifier) {
            return roomIdentifier + "_secure_e2ee_salt_9971";
        }

        function encryptText(plainText, roomName) {
            const secret = getRoomSecretPhrase(roomName);
            // Encrypts text using AES-256 and returns a clean, safe Base64 string payload
            return CryptoJS.AES.encrypt(plainText, secret).toString();
        }

        function decryptText(cipherText, roomName) {
            try {
                const secret = getRoomSecretPhrase(roomName);
                const bytes = CryptoJS.AES.decrypt(cipherText, secret);
                const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                
                // If it successfully decrypts but returns empty, or errors out, catch it safely
                if (!decryptedText) throw new Error("Decryption output empty");
                return decryptedText;
            } catch(e) {
                // If it's old plain text history or from an unmatching secret room, display this safely
                return cipherText.startsWith('U2FsdGVkX1') 
                    ? "🔒 [Decryption Failure: Missing Secret Keys]" 
                    : cipherText; // Gracefully render historical plain text if it wasn't encrypted yet
            }
        }

        function getUserAvatarStyles(username) {
            const colors = [
                { bg: 'bg-emerald-500/10', border: 'border-emerald-500/30', text: 'text-emerald-400' },
                { bg: 'bg-amber-500/10', border: 'border-amber-500/30', text: 'text-amber-400' },
                { bg: 'bg-rose-500/10', border: 'border-rose-500/30', text: 'text-rose-400' },
                { bg: 'bg-sky-500/10', border: 'border-sky-500/30', text: 'text-sky-400' },
                { bg: 'bg-fuchsia-500/10', border: 'border-fuchsia-500/30', text: 'text-fuchsia-400' },
                { bg: 'bg-purple-500/10', border: 'border-purple-500/30', text: 'text-purple-400' },
                { bg: 'bg-teal-500/10', border: 'border-teal-500/30', text: 'text-teal-400' }
            ];
            let hash = 0;
            for (let i = 0; i < username.length; i++) hash = username.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        async function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            if(!user || !pass) return alert("Fill in details!");

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();

            if(res.status === 200) {
                currentUsername = data.username;
                localStorage.setItem('chat_token', data.token);
                localStorage.setItem('chat_username', data.username);
                startChat();
            } else {
                const regRes = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const regData = await regRes.json();
                if(regRes.status === 201) {
                    currentUsername = regData.username;
                    localStorage.setItem('chat_token', regData.token);
                    localStorage.setItem('chat_username', regData.username);
                    alert("Account created automatically!");
                    startChat();
                } else {
                    alert(data.message || "Authentication failed.");
                }
            }
        }

        function logout() {
            localStorage.removeItem('chat_token');
            localStorage.removeItem('chat_username');
            if(socket) socket.disconnect();
            currentUsername = "";
            document.getElementById('messages').innerHTML = ""; 
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
        }

        async function startChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('welcome-title').innerText = `👤 ${currentUsername}`;

            const token = localStorage.getItem('chat_token');
            socket = io({ auth: { token } });
            socket.emit('register_user');

            switchRoom('global');

            socket.on('update_user_list', (onlineUsers) => {
                const container = document.getElementById('active-user-nodes');
                container.innerHTML = "";
                onlineUsers.forEach(user => {
                    if (user === currentUsername) return; 
                    const userBtn = document.createElement('button');
                    userBtn.className = "w-full flex items-center space-x-3 px-3 py-2 rounded-xl text-slate-300 hover:text-white hover:bg-slate-800/60 font-medium text-sm transition-all text-left cursor-pointer";
                    
                    const privateRoomId = [currentUsername, user].sort().join('_');
                    userBtn.onclick = () => switchRoom(privateRoomId, user);
                    userBtn.id = `room-btn-${privateRoomId}`;

                    const avatarInit = user.charAt(0).toUpperCase();
                    const style = getUserAvatarStyles(user);

                    userBtn.innerHTML = `
                        <div class="w-6 h-6 rounded-full ${style.bg} border ${style.border} flex items-center justify-center text-[11px] font-bold ${style.text} font-mono">${avatarInit}</div>
                        <span class="truncate flex-1">${user}</span>
                        <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-sm shadow-emerald-500/50"></div>
                    `;
                    container.appendChild(userBtn);
                });
            });

            socket.on('receive_message', async (data) => {
                if(data.room === currentRoom) {
                    renderSingleMessage(data);
                }
            });

            socket.on('message_deleted', (data) => {
                if(data.room === currentRoom) {
                    const TargetBubble = document.getElementById(`msg-node-${data.msgId}`);
                    if(TargetBubble) TargetBubble.remove();
                }
            });

            socket.on('user_typing', (data) => {
                const indicator = document.getElementById('typing-indicator');
                indicator.innerText = data.isTyping ? `✍️ ${data.user} is typing...` : "";
            });
        }

        async function switchRoom(roomId, targetDisplayName = null) {
            const prevActive = document.querySelector('[id^="room-btn-"].bg-indigo-600');
            if(prevActive) prevActive.className = prevActive.className.replace("bg-indigo-600 text-white font-medium shadow-lg shadow-indigo-600/10", "text-slate-300 hover:text-white hover:bg-slate-800/60 font-medium");

            currentRoom = roomId;
            const newActive = document.getElementById(`room-btn-${roomId}`);
            if(newActive) newActive.className = newActive.className.replace("text-slate-300 hover:text-white hover:bg-slate-800/60 font-medium", "bg-indigo-600 text-white font-medium shadow-lg shadow-indigo-600/10");

            document.getElementById('chat-header').innerText = roomId === 'global' ? "💬 Global Lounge" : `🔒 DM: ${targetDisplayName || 'Private Chat'}`;
            document.getElementById('messages').innerHTML = "";
            
            if(socket) socket.emit('join_room', currentRoom);

            try {
                const token = localStorage.getItem('chat_token');
                const response = await fetch(`/api/messages?room=${currentRoom}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(response.status === 200) {
                    const history = await response.json();
                    history.forEach(msg => renderSingleMessage(msg));
                }
            } catch (err) {
                console.error("❌ Error loading chat history:", err);
            }
            document.getElementById('msg-input').focus();
        }

        function requestDeleteMessage(msgId) {
            if(confirm("Are you sure you want to delete this message for everyone?")) {
                socket.emit('delete_message', { msgId });
            }
        }

        function renderSingleMessage(data) {
            const msgDiv = document.createElement('div');
            msgDiv.id = `msg-node-${data._id}`; 
            
            const msgTime = data.timestamp ? new Date(data.timestamp) : new Date();
            const formattedTime = msgTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const initial = data.user.charAt(0).toUpperCase();

            // 🚀 SYNC DECRYPT: Decrypt using pure JavaScript CryptoJS instantly
            const plainText = decryptText(data.text, currentRoom);

            const isImage = plainText.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null || plainText.startsWith('https://images.unsplash.com');
            const messageContent = isImage 
                ? `<img src="${plainText}" class="rounded-xl max-w-full h-auto max-h-48 object-cover mt-1 border border-slate-700/50 shadow-md cursor-pointer hover:opacity-90 transition-all" onclick="window.open('${plainText}', '_blank')">`
                : `${plainText}`;

            const style = getUserAvatarStyles(data.user);

            if (data.user === currentUsername) {
                msgDiv.className = "flex flex-col items-end space-y-0.5 group";
                msgDiv.innerHTML = `
                    <div class="flex items-center space-x-1.5 justify-end">
                        <button onclick="requestDeleteMessage('${data._id}')" class="text-[10px] text-rose-500 opacity-0 group-hover:opacity-100 mr-1 hover:underline cursor-pointer transition-all">Delete</button>
                        <span class="text-[10px] text-slate-400">You</span>
                        <span class="text-[9px] text-slate-500 font-mono">${formattedTime}</span>
                    </div>
                    <div class="${isImage ? '' : 'bg-indigo-600 text-white px-3.5 py-2 rounded-2xl rounded-tr-none'} text-sm max-w-[85%] break-words shadow-md shadow-indigo-600/10">${messageContent}</div>
                `;
            } else {
                msgDiv.className = "flex items-start space-x-2";
                msgDiv.innerHTML = `
                    <div class="w-7 h-7 rounded-full ${style.bg} border ${style.border} flex items-center justify-center text-xs font-bold ${style.text} mt-1 shrink-0 select-none">${initial}</div>
                    <div class="flex-1 flex flex-col space-y-0.5">
                        <div class="flex items-center space-x-1.5">
                            <span class="text-[10px] text-slate-400 font-medium">${data.user}</span>
                            <span class="text-[9px] text-slate-500 font-mono">${formattedTime}</span>
                        </div>
                        <div class="${isImage ? '' : 'bg-slate-700 text-slate-100 px-3.5 py-2 rounded-2xl rounded-tl-none'} text-sm max-w-[85%] break-words shadow-md self-start">${messageContent}</div>
                    </div>
                `;
            }
            
            const box = document.getElementById('messages');
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight; 
        }

        function checkEnter(event) {
            if (event.key === "Enter") {
                event.preventDefault(); 
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const cleanText = input.value.trim();
            if(!cleanText) return;

            // 🚀 SYNC ENCRYPT: Scramble plaintext using standard AES
            const cipherText = encryptText(cleanText, currentRoom);

            socket.emit('chat_message', {
                room: currentRoom,
                text: cipherText
            });

            input.value = "";
            socket.emit('typing', { room: currentRoom, isTyping: false });
        }

        function notifyTyping() {
            if(!socket) return;
            socket.emit('typing', { room: currentRoom, isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', { room: currentRoom, isTyping: false });
            }, 1500);
        }

        const savedUser = localStorage.getItem('chat_username');
        const savedToken = localStorage.getItem('chat_token');
        if (savedUser && savedToken) {
            currentUsername = savedUser.toLowerCase();
            startChat();
        } else {
            document.getElementById('username').focus();
        }
    </script>
</body>
</html>
