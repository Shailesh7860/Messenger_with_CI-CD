<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex justify-center items-center h-screen m-0 font-sans antialiased">

    <div id="auth-screen" class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-700/50 transition-all">
        <div class="text-center mb-6">
            <span class="text-4xl">⚡</span>
            <h2 class="text-2xl font-bold mt-2 text-white">Welcome Back</h2>
            <p class="text-slate-400 text-sm mt-1">Sign in or auto-register instantly</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Username" onkeydown="if(event.key === 'Enter') document.getElementById('password').focus()" class="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none text-white transition-all placeholder:text-slate-500" autofocus>
    
            <input type="password" id="password" placeholder="Password" onkeydown="if(event.key === 'Enter') login()" class="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none text-white transition-all placeholder:text-slate-500">
    
            <button onclick="login()" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 font-semibold rounded-xl text-white shadow-lg shadow-indigo-600/30 active:scale-[0.98] transition-all cursor-pointer">Log In / Register</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md h-[550px] flex flex-col border border-slate-700/50 overflow-hidden">
        <div class="bg-slate-950 p-4 border-b border-slate-700/50 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                <h2 id="chat-header" class="font-semibold text-white">💬 Global Chat</h2>
            </div>
            <div class="flex items-center space-x-2">
                <span id="user-count" class="text-xs text-indigo-400 bg-slate-900 border border-slate-700/60 px-2.5 py-1 rounded-md font-medium transition-all" title="Connecting...">👥 1 Online</span>
                <button onclick="logout()" class="text-xs text-slate-400 hover:text-rose-400 bg-slate-800 hover:bg-rose-950/30 border border-slate-700/50 hover:border-rose-900/50 px-2.5 py-1 rounded-md transition-all cursor-pointer font-medium">Log Out</button>
            </div>
        </div>

        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3 scrollbar-thin scrollbar-thumb-slate-700 scrollbar-track-transparent"></div>

        <div id="typing-indicator" class="px-4 text-xs text-indigo-400 italic h-5 flex items-center bg-slate-800/50 font-medium"></div>

        <div class="p-3 bg-slate-950 border-t border-slate-700/50 flex items-center space-x-2">
            <input type="text" id="msg-input" placeholder="Type a message..." oninput="notifyTyping()" onkeydown="checkEnter(event)" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white outline-none focus:border-indigo-500 transition-all text-sm">
            <button onclick="sendMessage()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl font-medium text-sm transition-all shadow-lg shadow-indigo-600/20 cursor-pointer active:scale-95">Send</button>
        </div>
    </div>

    <script>
        let socket;
        let currentUsername = "";
        let typingTimeout;

        async function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if(!user || !pass) return alert("Fill in details!");

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            if(res.status === 200) {
                currentUsername = user;
                localStorage.setItem('chat_username', user);
                startChat();
            } else {
                const regRes = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if(regRes.status === 201) {
                    currentUsername = user;
                    localStorage.setItem('chat_username', user);
                    alert("Account created automatically!");
                    startChat();
                } else {
                    alert("Authentication failed.");
                }
            }
        }

        function logout() {
            localStorage.removeItem('chat_username');
            
            if(socket) socket.disconnect();
            
            currentUsername = "";
            document.getElementById('messages').innerHTML = ""; 
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
            
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            document.getElementById('username').focus();
        }

        async function startChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('chat-header').innerText = `💬 Chatting as: ${currentUsername}`;

            document.getElementById('msg-input').focus();

            // Fetch historical backlog from MongoDB
            try {
                const response = await fetch('/api/messages');
                const history = await response.json();
                history.forEach(data => renderSingleMessage(data));
            } catch (err) {
                console.error("❌ Error loading chat history:", err);
            }

            socket = io();

            socket.emit('register_user', currentUsername);

            socket.on('update_user_list', (onlineUsers) => {
                const countBadge = document.getElementById('user-count');
                countBadge.innerText = `👥 ${onlineUsers.length} Online`;
                countBadge.title = `Active: ${onlineUsers.join(', ')}`;
            });

            socket.on('receive_message', (data) => {
                renderSingleMessage(data);
            });

            socket.on('user_typing', (data) => {
                const indicator = document.getElementById('typing-indicator');
                if (data.isTyping) {
                    indicator.innerText = `✍️ ${data.user} is typing...`;
                } else {
                    indicator.innerText = "";
                }
            });
        }

        function renderSingleMessage(data) {
            const msgDiv = document.createElement('div');
            
            if (data.user === currentUsername) {
                msgDiv.className = "flex flex-col items-end space-y-0.5";
                msgDiv.innerHTML = `
                    <span class="text-[10px] text-slate-400 px-1">You</span>
                    <div class="bg-indigo-600 text-white px-3.5 py-2 rounded-2xl rounded-tr-none text-sm max-w-[85%] break-words shadow-md shadow-indigo-600/10">${data.text}</div>
                `;
            } else {
                msgDiv.className = "flex flex-col items-start space-y-0.5";
                msgDiv.innerHTML = `
                    <span class="text-[10px] text-slate-400 px-1">${data.user}</span>
                    <div class="bg-slate-700 text-slate-100 px-3.5 py-2 rounded-2xl rounded-tl-none text-sm max-w-[85%] break-words shadow-md">${data.text}</div>
                `;
            }
            
            const box = document.getElementById('messages');
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight; 
        }

        function checkEnter(event) {
            if (event.key === "Enter") {
                event.preventDefault(); 
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;

            socket.emit('chat_message', {
                user: currentUsername,
                text: input.value.trim()
            });

            input.value = "";
            socket.emit('typing', { user: currentUsername, isTyping: false });
        }

        function notifyTyping() {
            if(!socket) return;
            socket.emit('typing', { user: currentUsername, isTyping: true });
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', { user: currentUsername, isTyping: false });
            }, 1500);
        }

        // Auto-Login Hook Process
        const savedUser = localStorage.getItem('chat_username');
        if (savedUser) {
            currentUsername = savedUser;
            startChat();
        } else {
            document.getElementById('username').focus();
        }
    </script>
</body>
</html>
